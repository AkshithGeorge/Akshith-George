<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Me</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
            color: #fff;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            top: 0;
            left: 0;
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 40px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            text-decoration: none;
            position: relative;
        }

        nav a::after {
            content: "";
            width: 0;
            height: 2px;
            background: #ffd369;
            position: absolute;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        .container {
            width: 85%;
            margin: auto;
            padding: 40px 0;
        }

        .contact-box {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
        }

        .contact-info {
            flex: 1;
        }

        .contact-info h2 {
            color: #ffd369;
            margin-bottom: 15px;
        }

        .contact-info p {
            margin: 10px 0;
            opacity: 0.9;
        }

        .contact-form {
            flex: 1;
        }

        .contact-form h2 {
            color: #ffd369;
            margin-bottom: 15px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .contact-form textarea {
            resize: none;
            height: 100px;
        }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(45deg, #ffd369, #ff9f43);
            color: black;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            margin-top: 40px;
        }

    </style>
</head>

<body>

<header>
    <h1>Contact Me</h1>
</header>

<nav>
    <a href="aks.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="projects.html">Projects</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="contact-box">

        <!-- Contact Info -->
        <div class="contact-info">
            <h2>Get In Touch 📞</h2>
            <p>📍 Name: Akshith George</p>
            <p>📍 Location: INDIA</p>
            <p>📧 Email: akshithgeorge@email.com</p>
            <p>📱 Phone: +91 7902720251</p>
            <p>I’m open for collaborations and opportunities!</p>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Send Message ✉️</h2>

            <form onsubmit="return validateForm()">

                <input type="text" id="name" placeholder="Your Name">
                <div id="nameError" class="error"></div>

                <input type="email" id="email" placeholder="Your Email">
                <div id="emailError" class="error"></div>

                <textarea id="message" placeholder="Your Message"></textarea>
                <div id="messageError" class="error"></div>

                <button type="submit" class="btn">Send Message</button>

            </form>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 Your Name | Portfolio</p>
</footer>

<script>
function validateForm() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    let valid = true;

    document.getElementById("nameError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("messageError").innerHTML = "";

    if (name === "") {
        document.getElementById("nameError").innerHTML = "Name is required";
        valid = false;
    }

    if (email === "") {
        document.getElementById("emailError").innerHTML = "Email is required";
        valid = false;
    } else if (!email.includes("@")) {
        document.getElementById("emailError").innerHTML = "Enter valid email";
        valid = false;
    }

    if (message === "") {
        document.getElementById("messageError").innerHTML = "Message cannot be empty";
        valid = false;
    }

    if (valid) {
        alert("Message sent successfully!");
    }

    return valid;
}
</script>

</body>
</html>
